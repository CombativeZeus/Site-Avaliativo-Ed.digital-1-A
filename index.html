<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéWorld - Explore o Universo Pokémon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://raw.githubusercontent.com">
</head>
<body>
    <section class="accessibility-bar" aria-label="Controles de Acessibilidade">
        <button onclick="changeFontSize('increase')" aria-label="Aumentar fonte">A+</button>
        <button onclick="changeFontSize('decrease')" aria-label="Diminuir fonte">A-</button>
        <button onclick="toggleContrast()" aria-label="Alternar Alto Contraste">🌓 Alto Contraste</button>
    </section>

    <header role="banner">
        <nav aria-label="Menu Principal">
            <div class="logo">PokéWorld</div>
            <ul>
                <li><a href="#galeria">Pokémon</a></li>
                <li><a href="#faq">Dúvidas</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="galeria" class="reveal">
            <h2 id="hero-title">Galeria Pokémon</h2>
            <div id="pokemonGrid" class="grid-container"></div>
        </section>

        <section id="faq" class="reveal">
            <h2>Dúvidas Frequentes</h2>
            <div id="accordionContainer"></div>
        </section>
    </main>

    <script src="sc.js"></script>
</body>
</html>
